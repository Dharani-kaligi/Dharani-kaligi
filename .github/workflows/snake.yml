name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub Contribution Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Dharani-kaligi
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%238B5CF6&color_dots=%23EBF4FF,%23BFDBFE,%2393C5FD,%2360A5FA,%232563EB
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23A855F7&color_dots=%23161B22,%231F6FEB,%23388BFD,%2358A6FF,%2379C0FF

      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
